<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0E0E12" />
    <title>Fluid.Avalonia.Acrylic — live demo</title>
    <meta name="description" content="A cross-platform, software-rendered acrylic / frosted-glass backdrop for Avalonia. Try the live WebAssembly demo right in your browser." />
    <link rel="canonical" href="https://alpaq92.github.io/Fluid.Avalonia.Acrylic/" />

    <!-- Social / link-preview cards (Open Graph + Twitter). Shown when the live-demo URL is shared
         on WhatsApp, Facebook, LinkedIn, Slack, Discord, X, etc. Crawlers read these from the static
         HTML before the WASM runtime starts, so they work without JS. Absolute URLs are required. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Fluid.Avalonia.Acrylic" />
    <meta property="og:title" content="Fluid.Avalonia.Acrylic — live WebAssembly demo" />
    <meta property="og:description" content="A cross-platform, software-rendered acrylic / frosted-glass backdrop for Avalonia. One shader, every platform." />
    <meta property="og:url" content="https://alpaq92.github.io/Fluid.Avalonia.Acrylic/" />
    <meta property="og:image" content="https://raw.githubusercontent.com/Alpaq92/Fluid.Avalonia.Acrylic/main/docs/acrylic-hero.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1000" />
    <meta property="og:image:height" content="560" />
    <meta property="og:image:alt" content="A frosted-glass AcrylicSurface card over a vibrant backdrop." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Fluid.Avalonia.Acrylic — live WebAssembly demo" />
    <meta name="twitter:description" content="A cross-platform, software-rendered acrylic / frosted-glass backdrop for Avalonia. One shader, every platform." />
    <meta name="twitter:image" content="https://raw.githubusercontent.com/Alpaq92/Fluid.Avalonia.Acrylic/main/docs/acrylic-hero.png" />
    <meta name="twitter:image:alt" content="A frosted-glass AcrylicSurface card over a vibrant backdrop." />

    <!-- Relative href on purpose: the site is served under /Fluid.Avalonia.Acrylic/. -->
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        body { background: #0E0E12; }
        #out { width: 100%; height: 100%; }

        /* Loading splash — shown until the WASM runtime mounts the app:
           the brand mark, an indeterminate progress bar, and a short description. */
        #loading {
            position: fixed; inset: 0; z-index: 10;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 26px; padding: 24px; box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', -apple-system, sans-serif;
            background: #0E0E12;
            transition: opacity 0.3s ease;
        }
        #loading.hide { opacity: 0; pointer-events: none; }

        .splash-logo { width: 96px; height: 96px; }

        /* Indeterminate progress bar: an accent segment sweeping across a thin track. */
        .splash-bar {
            position: relative; width: 260px; max-width: 78vw; height: 4px;
            border-radius: 2px; overflow: hidden;
            background: rgba(255, 255, 255, 0.12);
        }
        .splash-bar::before {
            content: ''; position: absolute; top: 0; bottom: 0; width: 40%;
            border-radius: 2px; background: #AE3EC9;
            animation: splash-indet 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes splash-indet {
            0%   { left: -45%; }
            100% { left: 100%; }
        }

        .splash-desc {
            max-width: 400px; text-align: center;
            color: #9d9d9d; font-size: 13px; line-height: 1.5; font-weight: 400;
        }

        @media (prefers-reduced-motion: reduce) {
            .splash-bar::before { animation-duration: 3s; }
        }
    </style>
</head>
<body>
    <div id="loading">
        <svg class="splash-logo" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <defs>
                <linearGradient id="grape" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0" stop-color="#AE3EC9" />
                    <stop offset="1" stop-color="#862E9C" />
                </linearGradient>
            </defs>
            <rect x="16" y="16" width="480" height="480" rx="104" ry="104" fill="url(#grape)" />
            <g transform="scale(21.333)" fill="#FFFFFF">
                <path d="M6,6V18H10V16H8V8H10V6H6Z" />
                <path d="M16,16H14V18H18V6H14V8H16V16Z" />
            </g>
        </svg>

        <div class="splash-bar" role="progressbar" aria-label="Loading"></div>

        <div class="splash-desc">A cross-platform, software-rendered acrylic / frosted-glass backdrop for Avalonia. One SkiaSharp shader, every platform.</div>
    </div>

    <div id="out"></div>
    <script type="module" src="./main.js"></script>
</body>
</html>
