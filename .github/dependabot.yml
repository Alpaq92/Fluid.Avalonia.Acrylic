version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/Fluid.Avalonia.Acrylic"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    # `fix(deps):` routes into the "Dependencies" section of CHANGELOG.md and
    # triggers a patch release. Auto-merge squashes using the PR title, so the
    # squashed commit inherits this prefix.
    commit-message:
      prefix: "fix(deps)"
    groups:
      nuget-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    # SkiaSharp must track the major Avalonia.Skia is built against (3.x for
    # Avalonia 12). A 4.x bump compiles (deprecated APIs) but is not runtime-
    # compatible, so a passing CI build wouldn't catch it — never propose a major.
    ignore:
      - dependency-name: "SkiaSharp"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    # `chore(deps):` is hidden from CHANGELOG and does not trigger a release.
    commit-message:
      prefix: "chore(deps)"
