name: CodeQL

# Static security analysis (the ruleset's code_scanning rule requires CodeQL to
# pass at "high or higher"). C# is analyzed build-less (no project build needed).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          build-mode: none

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:csharp"
