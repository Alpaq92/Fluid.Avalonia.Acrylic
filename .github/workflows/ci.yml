name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: Build (Fluid.Avalonia.Acrylic)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Install WASM tools
        run: dotnet workload install wasm-tools

      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      # Builds the whole solution: the library, the shared demo, and the Desktop + Browser
      # (WebAssembly) heads. wasm-tools is required to compile the net10.0-browser head.
      - name: Restore
        run: dotnet restore Fluid.Avalonia.Acrylic.slnx

      - name: Build
        run: dotnet build Fluid.Avalonia.Acrylic.slnx --configuration Release --no-restore
