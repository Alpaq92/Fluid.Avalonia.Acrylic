name: Deploy live demo to GitHub Pages

# Builds the Fluid.Avalonia.Acrylic.Demo.Browser WebAssembly head and publishes it to
# GitHub Pages. Enable once in the repo:
#   Settings → Pages → Build and deployment → Source = "GitHub Actions".

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer runs supersede in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: 10.0.x

      - name: Install WASM tools
        run: dotnet workload install wasm-tools

      - name: Publish Browser head
        run: dotnet publish Fluid.Avalonia.Acrylic.Demo.Browser/Fluid.Avalonia.Acrylic.Demo.Browser.csproj -c Release -o publish

      - name: Disable Jekyll (keep _framework, leading-underscore files)
        run: touch publish/wwwroot/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: publish/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
